<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #faf8fe;
  --surface: #ffffff;
  --surface2: #f3effe;
  --border: #e4d9fc;
  --border2: #ccb8f8;
  --ink: #18102a;
  --ink2: #5c4a7a;
  --ink3: #a090c0;
  --avail: #ede5fd;
  --avail-border: #ccb8f8;
  --avail-text: #5c20c0;
  --busy: #fde8e8;
  --busy-border: #e8a0a0;
  --busy-text: #7a2828;
  --accent: #9229f5;
  --accent-light: #f0e8fe;
  --accent-mid: #c090fa;
  --today-col: #f5eeff;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --slot-w: 88px;
  --name-w: 180px;
  --email-w: 200px;
  --row-h: 52px;
  --head-h1: 36px;
  --head-h2: 28px;
}

html, body { height: 100%; background: var(--bg); color: var(--ink); font-family: var(--sans); }
body { display: flex; flex-direction: column; overflow: hidden; }

/* ── Password gate ── */
.gate {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  flex-direction: column;
  gap: 0;
}
.gate-box {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 40px 36px;
  width: 340px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  box-shadow: 0 8px 40px rgba(146,41,245,0.10);
}
.gate-title {
  font-size: 20px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: -0.02em;
}
.gate-sub {
  font-size: 13px;
  color: var(--ink3);
  margin-top: -12px;
  font-family: var(--mono);
}
.gate-input {
  font-family: var(--sans);
  font-size: 14px;
  padding: 11px 14px;
  border: 1.5px solid var(--border2);
  border-radius: 7px;
  background: var(--bg);
  color: var(--ink);
  outline: none;
  transition: border-color 0.14s;
  width: 100%;
}
.gate-input:focus { border-color: var(--accent); }
.gate-btn {
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 600;
  padding: 11px;
  border-radius: 7px;
  border: none;
  cursor: pointer;
  background: var(--accent);
  color: white;
  transition: background 0.14s;
  width: 100%;
}
.gate-btn:hover { background: #7a18d4; }
.gate-error {
  font-size: 12px;
  color: var(--busy-text);
  font-family: var(--mono);
  text-align: center;
  min-height: 16px;
}
.gate-accent-bar {
  width: 40px; height: 3px;
  background: var(--accent);
  border-radius: 2px;
  margin-bottom: 4px;
}

/* ── Loading overlay ── */
.loading-overlay {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 999;
  flex-direction: column;
  gap: 14px;
}
.loading-overlay.hidden { display: none; }
.spinner {
  width: 28px; height: 28px;
  border: 3px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-family: var(--mono); font-size: 12px; color: var(--ink3); }

/* ── Sync indicator ── */
.sync-indicator {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink3);
  display: flex;
  align-items: center;
  gap: 5px;
}
.sync-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #8fbc98;
  flex-shrink: 0;
  transition: background 0.3s;
}
.sync-dot.syncing { background: var(--accent-mid); animation: pulse 0.8s infinite; }
.sync-dot.error { background: var(--busy-border); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── Top bar ── */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
  z-index: 60;
}
.topbar-title { font-family: var(--sans); font-size: 17px; font-weight: 600; color: var(--ink); border: none; background: transparent; outline: none; flex: 1; min-width: 0; letter-spacing: -0.01em; }
.topbar-title:focus { border-bottom: 1px solid var(--accent); }
.topbar-actions { display: flex; gap: 8px; align-items: center; }
.btn { font-family: var(--sans); font-size: 12px; font-weight: 500; padding: 7px 14px; border-radius: 5px; border: none; cursor: pointer; transition: all 0.14s; white-space: nowrap; }
.btn-ghost { background: transparent; color: var(--ink2); border: 1px solid var(--border2); }
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
.btn-accent { background: var(--accent); color: white; }
.btn-accent:hover { background: #7a18d4; }

/* ── Range bar ── */
.rangebar { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 10px 24px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; flex-wrap: wrap; }
.rangebar label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink3); margin-right: 4px; }
.range-input { font-family: var(--mono); font-size: 12px; padding: 5px 10px; border: 1px solid var(--border2); border-radius: 4px; background: var(--surface); color: var(--ink); outline: none; }
.range-input:focus { border-color: var(--accent); }
.range-sep { color: var(--ink3); font-size: 12px; }
.slot-checkboxes { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-left: 8px; }
.slot-check { display: flex; align-items: center; gap: 4px; font-family: var(--mono); font-size: 10px; color: var(--ink2); cursor: pointer; padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface); transition: all 0.12s; user-select: none; }
.slot-check:hover { border-color: var(--accent); color: var(--accent); }
.slot-check.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); font-weight: 500; }
.slot-check input { display: none; }
.legend { display: flex; gap: 14px; align-items: center; margin-left: auto; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--ink2); font-family: var(--mono); }
.legend-dot { width: 12px; height: 12px; border-radius: 2px; }

/* ── Scroll ── */
.scroll-outer { flex: 1; overflow: auto; position: relative; user-select: none; }
.scroll-outer::-webkit-scrollbar { width: 6px; height: 6px; }
.scroll-outer::-webkit-scrollbar-track { background: transparent; }
.scroll-outer::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── Table ── */
.schedule-table { border-collapse: collapse; min-width: 100%; table-layout: fixed; }
.col-name { width: var(--name-w); min-width: var(--name-w); position: sticky; left: 0; z-index: 30; background: var(--surface); }
.col-email { width: var(--email-w); min-width: var(--email-w); position: sticky; left: var(--name-w); z-index: 30; background: var(--surface); }
thead tr.row-days th, thead tr.row-slots th { position: sticky; z-index: 20; background: var(--surface); }
thead tr.row-days { top: 0; }
thead tr.row-slots { top: var(--head-h1); }
thead tr.row-days th.col-name, thead tr.row-days th.col-email,
thead tr.row-slots th.col-name, thead tr.row-slots th.col-email { z-index: 40; }
.th-day { height: var(--head-h1); text-align: center; font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink2); border-bottom: 1px solid var(--border); border-right: 2px solid var(--border); padding: 0 4px; white-space: nowrap; vertical-align: middle; }
.th-day.today { background: var(--today-col); color: var(--accent); font-weight: 600; }
.th-day.weekend { color: var(--ink3); }
.th-name-head, .th-email-head { height: var(--head-h1); text-align: left; font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink3); padding: 0 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.th-name-head { border-right: 1px solid var(--border); }
.th-email-head { border-right: 2px solid var(--border2); }
.th-slot { height: var(--head-h2); text-align: center; font-family: var(--mono); font-size: 9px; color: var(--ink3); border-bottom: 2px solid var(--border2); border-right: 1px solid var(--border); padding: 0 2px; white-space: nowrap; vertical-align: middle; width: var(--slot-w); min-width: var(--slot-w); }
.th-slot:last-of-type { border-right: 2px solid var(--border); }
.th-slot-name-empty, .th-slot-email-empty { height: var(--head-h2); border-bottom: 2px solid var(--border2); }
.th-slot-name-empty { border-right: 1px solid var(--border); }
.th-slot-email-empty { border-right: 2px solid var(--border2); }
tbody tr { height: var(--row-h); }
tbody tr:hover .cell-name, tbody tr:hover .cell-email { background: #f5f0fe; }
.cell-name { padding: 0 14px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); background: var(--surface); vertical-align: middle; }
.cell-email { padding: 0 14px; border-bottom: 1px solid var(--border); border-right: 2px solid var(--border2); background: var(--surface); vertical-align: middle; }
.name-text { font-size: 13px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
.email-text { font-size: 11px; color: var(--ink3); font-family: var(--mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
.row-actions { display: flex; gap: 4px; margin-top: 2px; }
.row-act-btn { font-size: 10px; color: var(--ink3); cursor: pointer; padding: 1px 4px; border-radius: 3px; background: none; border: none; font-family: var(--sans); transition: all 0.1s; }
.row-act-btn:hover { color: var(--accent); background: var(--accent-light); }
.row-act-btn.del:hover { color: #9a3030; background: var(--busy); }

/* ── Cells ── */
.cell-slot { border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); vertical-align: middle; text-align: center; cursor: pointer; position: relative; width: var(--slot-w); min-width: var(--slot-w); padding: 4px; transition: background 0.08s; }
.cell-slot.last-in-day { border-right: 2px solid var(--border); }
.cell-slot.state-empty { background: #fafafe; }
.cell-slot.state-empty:hover { background: var(--accent-light); }
.cell-slot.state-avail { background: var(--avail); }
.cell-slot.state-avail:hover { background: #ddd0fc; }
.cell-slot.state-busy { background: var(--busy); }
.cell-slot.state-busy:hover { background: #fad0d0; }
.cell-slot.today-col.state-empty { background: var(--today-col); }
.cell-slot.today-col.state-avail { background: #dcd0fc; }
.cell-slot.selected { outline: 2px solid var(--accent) !important; outline-offset: -2px; position: relative; z-index: 4; }
.cell-slot.selected.state-empty { background: var(--accent-light); }
.slot-inner { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; min-height: 42px; pointer-events: none; }
.slot-icon { font-size: 13px; line-height: 1; }
.slot-label { font-size: 9px; font-family: var(--mono); color: var(--avail-text); max-width: calc(var(--slot-w) - 8px); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: center; line-height: 1.2; }
.cell-slot.state-busy .slot-label { color: var(--busy-text); }
.cell-slot.state-empty .slot-label { color: var(--ink3); }

/* ── Bulk bar ── */
.bulk-bar { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1a1228; border: 1px solid #342050; border-radius: 10px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; z-index: 500; box-shadow: 0 12px 40px rgba(0,0,0,0.3); transition: transform 0.28s cubic-bezier(0.34,1.4,0.64,1); white-space: nowrap; }
.bulk-bar.show { transform: translateX(-50%) translateY(0); }
.bulk-count { font-family: var(--mono); font-size: 11px; color: #a090c8; padding-right: 10px; border-right: 1px solid #342050; }
.bulk-btn { font-family: var(--sans); font-size: 12px; font-weight: 500; padding: 6px 13px; border-radius: 5px; border: none; cursor: pointer; transition: all 0.12s; }
.bulk-avail { background: var(--avail); color: var(--avail-text); }
.bulk-avail:hover { background: #ddd0fc; }
.bulk-busy { background: var(--busy); color: var(--busy-text); }
.bulk-busy:hover { background: #f8c8c8; }
.bulk-clear { background: #2a1a44; color: #c0b0e0; }
.bulk-clear:hover { background: #3a2254; }
.bulk-sep { width: 1px; height: 22px; background: #342050; flex-shrink: 0; }
.bulk-label-btn { background: var(--accent); color: white; }
.bulk-label-btn:hover { background: #7a18d4; }
.bulk-label-row { display: none; align-items: center; gap: 6px; }
.bulk-label-row.show { display: flex; }
.bulk-label-input { font-family: var(--sans); font-size: 12px; padding: 5px 10px; border-radius: 4px; border: 1px solid #4a2880; background: #200c38; color: #e0d0f8; outline: none; width: 150px; }
.bulk-label-input:focus { border-color: #9229f5; }
.bulk-label-ok { background: var(--accent); color: white; padding: 5px 10px; border-radius: 4px; border: none; cursor: pointer; font-size: 12px; }
.bulk-label-ok:hover { background: #7a18d4; }
.bulk-deselect { background: none; border: none; color: #7050a0; cursor: pointer; font-size: 16px; padding: 2px 6px; line-height: 1; }
.bulk-deselect:hover { color: #c0a0f0; }

/* ── Modals ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(24,16,42,0.45); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; padding: 28px; width: 400px; max-width: 94vw; display: flex; flex-direction: column; gap: 16px; box-shadow: 0 16px 48px rgba(146,41,245,0.10); }
.modal h3 { font-family: var(--sans); font-size: 16px; font-weight: 600; color: var(--ink); letter-spacing: -0.01em; }
.modal-sub { font-size: 12px; color: var(--ink2); margin-top: -8px; }
.field-group { display: flex; flex-direction: column; gap: 5px; }
.field-group label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink3); }
.field-input { font-family: var(--sans); font-size: 13px; padding: 9px 11px; border: 1px solid var(--border2); border-radius: 5px; background: var(--bg); color: var(--ink); outline: none; transition: border-color 0.14s; }
.field-input:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
.state-picker { display: flex; gap: 8px; }
.state-option { flex: 1; padding: 10px 8px; border-radius: 5px; cursor: pointer; text-align: center; font-size: 12px; font-family: var(--mono); border: 2px solid transparent; transition: all 0.12s; user-select: none; }
.state-option.avail { background: var(--avail); color: var(--avail-text); }
.state-option.avail.selected, .state-option.avail:hover { border-color: var(--avail-border); }
.state-option.busy { background: var(--busy); color: var(--busy-text); }
.state-option.busy.selected, .state-option.busy:hover { border-color: var(--busy-border); }
.state-option.empty { background: var(--surface2); color: var(--ink2); }
.state-option.empty.selected, .state-option.empty:hover { border-color: var(--border2); }

/* ── Empty state ── */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 24px; gap: 12px; color: var(--ink3); font-size: 13px; text-align: center; }
.empty-state .big { font-size: 32px; }

/* ── Mobile ── */
@media (max-width: 640px) {
  :root {
    --slot-w: 52px;
    --name-w: 100px;
    --row-h: 44px;
    --head-h1: 32px;
    --head-h2: 24px;
  }

  /* Hide email column entirely */
  .col-email, .th-email-head, .th-slot-email-empty, .cell-email { display: none !important; }

  /* Name sticky: no longer needs email offset */
  .col-email { left: 0 !important; }

  /* Tighten topbar */
  .topbar { padding: 0 12px; height: 48px; gap: 8px; }
  .topbar-title { font-size: 14px; }
  .btn { padding: 6px 10px; font-size: 11px; }
  .btn-ghost { display: none; }

  /* Rangebar stacks */
  .rangebar { padding: 8px 12px; gap: 8px; flex-direction: column; align-items: flex-start; }
  .range-input { font-size: 11px; padding: 4px 8px; }
  .legend { display: none; }

  /* Cells */
  .slot-label { font-size: 8px; }
  .slot-icon { font-size: 11px; }
  .slot-inner { min-height: 34px; }
  .cell-name { padding: 0 8px; }
  .name-text { font-size: 12px; }
  .row-actions { gap: 2px; }
  .row-act-btn { font-size: 9px; padding: 1px 3px; }
  .th-day { font-size: 8px; padding: 0 2px; }
  .th-slot { font-size: 8px; }

  /* Bulk bar */
  .bulk-bar { width: 90vw; flex-wrap: wrap; justify-content: center; padding: 10px; gap: 6px; bottom: 12px; }
  .bulk-count { border-right: none; padding-right: 0; width: 100%; text-align: center; }
  .bulk-sep { display: none; }

  /* Gate */
  .gate-box { width: 90vw; padding: 28px 20px; }
}
</style>
</head>
<body>

<!-- Loading overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">connecting to database…</div>
</div>

<!-- Password gate -->
<div class="gate" id="gate" style="display:none">
  <div class="gate-box">
    <div class="gate-accent-bar"></div>
    <div class="gate-title">Schedule Alignment</div>
    <div class="gate-sub">enter password to continue</div>
    <input class="gate-input" id="gateInput" type="password" placeholder="Password" autofocus>
    <button class="gate-btn" onclick="tryUnlock()">Enter</button>
    <div class="gate-error" id="gateError"></div>
  </div>
</div>

<!-- App (hidden until unlocked) -->
<div id="app" style="display:none;flex-direction:column;height:100%">

  <div class="topbar">
    <input class="topbar-title" id="schedTitle" value="Schedule" spellcheck="false">
    <div class="topbar-actions">
      <div class="sync-indicator">
        <div class="sync-dot" id="syncDot"></div>
        <span id="syncLabel">synced</span>
      </div>
      <button class="btn btn-ghost" onclick="exportCSV()">CSV</button>
      <button class="btn btn-ghost" onclick="exportJSON()">JSON</button>
      <button class="btn btn-accent" onclick="openAddPerson()">+ Person</button>
    </div>
  </div>

  <div class="rangebar">
    <div style="display:flex;align-items:center;gap:8px">
      <label>From</label>
      <input class="range-input" type="date" id="rangeStart">
      <span class="range-sep">→</span>
      <label>To</label>
      <input class="range-input" type="date" id="rangeEnd">
      <button class="btn btn-accent" style="padding:6px 14px;font-size:12px" onclick="applyRange()">Apply</button>
    </div>
    <div style="display:flex;align-items:center;gap:6px;margin-left:16px">
      <label>Slots</label>
      <div class="slot-checkboxes" id="slotToggles"></div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--avail);border:1px solid var(--avail-border)"></div>Available</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--busy);border:1px solid var(--busy-border)"></div>Busy</div>
      <div class="legend-item"><div class="legend-dot" style="background:#fafafe;border:1px solid var(--border)"></div>Unset</div>
      <div class="legend-item" style="color:var(--ink3);font-size:10px;font-family:var(--mono)">drag · ctrl · shift</div>
    </div>
  </div>

  <div class="scroll-outer" id="scrollOuter">
    <div id="tableWrap"></div>
  </div>
</div>

<!-- Bulk bar -->
<div class="bulk-bar" id="bulkBar">
  <span class="bulk-count" id="bulkCount">0 selected</span>
  <button class="bulk-btn bulk-avail" onclick="bulkSetState('avail')">✓ Available</button>
  <button class="bulk-btn bulk-busy" onclick="bulkSetState('busy')">✗ Busy</button>
  <button class="bulk-btn bulk-clear" onclick="bulkSetState('empty')">Clear</button>
  <div class="bulk-sep"></div>
  <button class="bulk-btn bulk-label-btn" onclick="toggleBulkLabel()">Label…</button>
  <div class="bulk-label-row" id="bulkLabelRow">
    <input class="bulk-label-input" id="bulkLabelInput" placeholder="Activity label…">
    <button class="bulk-label-ok" onclick="bulkApplyLabel()">Apply</button>
  </div>
  <div class="bulk-sep"></div>
  <button class="bulk-deselect" onclick="clearSelection()" title="Deselect all">✕</button>
</div>

<!-- Cell modal -->
<div class="modal-overlay" id="cellModal" onclick="maybeClose(event,'cellModal')">
  <div class="modal">
    <h3 id="cellModalTitle">Edit slot</h3>
    <div class="modal-sub" id="cellModalSub"></div>
    <div class="field-group">
      <label>Status</label>
      <div class="state-picker">
        <div class="state-option avail" onclick="selectState('avail')">✓ Available</div>
        <div class="state-option busy" onclick="selectState('busy')">✗ Busy</div>
        <div class="state-option empty" onclick="selectState('empty')">— Unset</div>
      </div>
    </div>
    <div class="field-group">
      <label>Activity <span style="font-weight:300;color:var(--ink3)">(optional)</span></label>
      <input class="field-input" id="cellActivity" type="text" placeholder="e.g. Workshop, Meeting, Lunch…">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('cellModal')">Cancel</button>
      <button class="btn btn-accent" onclick="saveCellEdit()">Save</button>
    </div>
  </div>
</div>

<!-- Add person modal -->
<div class="modal-overlay" id="addPersonModal" onclick="maybeClose(event,'addPersonModal')">
  <div class="modal">
    <h3>Add person</h3>
    <div class="field-group">
      <label>Full name</label>
      <input class="field-input" id="newName" type="text" placeholder="e.g. Maria Rossi">
    </div>
    <div class="field-group">
      <label>Email</label>
      <input class="field-input" id="newEmail" type="email" placeholder="e.g. m.rossi@polimi.it">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('addPersonModal')">Cancel</button>
      <button class="btn btn-accent" onclick="confirmAddPerson()">Add</button>
    </div>
  </div>
</div>

<!-- Edit person modal -->
<div class="modal-overlay" id="editPersonModal" onclick="maybeClose(event,'editPersonModal')">
  <div class="modal">
    <h3>Edit person</h3>
    <div class="field-group">
      <label>Full name</label>
      <input class="field-input" id="editName" type="text">
    </div>
    <div class="field-group">
      <label>Email</label>
      <input class="field-input" id="editEmail" type="email">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('editPersonModal')">Cancel</button>
      <button class="btn btn-accent" onclick="confirmEditPerson()">Save</button>
    </div>
  </div>
</div>

<!-- Firebase SDK (modular via CDN compat build) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// ── PASSWORD — change this to whatever you want ───────────────────────────────
const CORRECT_PASSWORD = 'schedule2025';

// ── Firebase config ───────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCgyiPSE8Zg3ehmCLVUdaBv3xIAuooM1nk",
  authDomain: "schedule-alignment-tool.firebaseapp.com",
  projectId: "schedule-alignment-tool",
  storageBucket: "schedule-alignment-tool.firebasestorage.app",
  messagingSenderId: "937357814709",
  appId: "1:937357814709:web:388385d49d4c2d867207fc"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const DOC_REF = db.collection('schedule').doc('main');

// ── Constants ─────────────────────────────────────────────────────────────────
const ALL_SLOTS = [
  { id: 's1', label: '9–10',  full: '9:00–10:00' },
  { id: 's2', label: '10–12', full: '10:00–12:00' },
  { id: 's3', label: '12–14', full: '12:00–14:00' },
  { id: 's4', label: '14–16', full: '14:00–16:00' },
  { id: 's5', label: '16–18', full: '16:00–18:00' },
];
const DAY_SHORT   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ── Helpers ───────────────────────────────────────────────────────────────────
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
function toISO(d) { return d.toISOString().slice(0,10); }
function fromISO(s) { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function addDays(d,n) { const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function uid() { return Math.random().toString(36).slice(2,8); }
function isToday(d) { return d.getTime()===TODAY.getTime(); }
function isWeekend(d) { return d.getDay()===0||d.getDay()===6; }
function cellKey(pid,date,sid) { return `${pid}|${toISO(date)}|${sid}`; }
function getCell(pid,date,sid) { return state.cells[cellKey(pid,date,sid)]||{state:'empty',activity:''}; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function defaultRange() {
  return { start: toISO(TODAY), end: toISO(addDays(TODAY,13)) };
}

// ── App state ─────────────────────────────────────────────────────────────────
let state = {
  title: 'Schedule',
  range: defaultRange(),
  activeSlots: ['s1','s2','s3','s4','s5'],
  people: [],
  cells: {}
};

let unsubscribe = null; // Firestore listener cleanup

// ── Password gate ─────────────────────────────────────────────────────────────
function tryUnlock() {
  const val = document.getElementById('gateInput').value;
  if (val === CORRECT_PASSWORD) {
    sessionStorage.setItem('sched_unlocked','1');
    document.getElementById('gate').style.display = 'none';
    startApp();
  } else {
    document.getElementById('gateError').textContent = 'Incorrect password.';
    document.getElementById('gateInput').value = '';
    document.getElementById('gateInput').focus();
  }
}

// ── Firestore sync ────────────────────────────────────────────────────────────
function setSyncState(s) {
  const dot   = document.getElementById('syncDot');
  const label = document.getElementById('syncLabel');
  dot.className = 'sync-dot' + (s==='syncing'?' syncing':s==='error'?' error':'');
  label.textContent = s==='syncing'?'saving…':s==='error'?'error':'synced';
}

// Write full state to Firestore
let saveTimer = null;
function save() {
  setSyncState('syncing');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    // Firestore doesn't like dots in field names — cells keys use | so that's fine
    DOC_REF.set(state)
      .then(() => setSyncState('synced'))
      .catch(e => { console.error(e); setSyncState('error'); });
  }, 600); // debounce 600ms
}

// Subscribe to live updates from Firestore
function subscribeToFirestore() {
  if (unsubscribe) unsubscribe();
  unsubscribe = DOC_REF.onSnapshot(doc => {
    if (doc.exists) {
      const remote = doc.data();
      // Merge: don't overwrite if we're in the middle of editing a modal
      state = remote;
      renderAll();
    }
    // If doc doesn't exist yet, we'll create it on first save
  }, err => {
    console.error('Firestore listener error:', err);
    setSyncState('error');
  });
}

// ── Start app ─────────────────────────────────────────────────────────────────
function startApp() {
  document.getElementById('app').style.display = 'flex';
  document.getElementById('loadingOverlay').classList.add('hidden');

  // Subscribe — this loads initial data and keeps it live
  subscribeToFirestore();

  // If first time (doc doesn't exist), initialize with defaults after short wait
  setTimeout(() => {
    DOC_REF.get().then(doc => {
      if (!doc.exists) {
        // First run: save the default empty state
        DOC_REF.set(state);
      }
    });
  }, 1000);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem('sched_unlocked') === '1') {
    document.getElementById('gate').style.display = 'none';
    startApp();
  } else {
    document.getElementById('loadingOverlay').classList.add('hidden');
    document.getElementById('gate').style.display = 'flex';
    setTimeout(() => document.getElementById('gateInput').focus(), 100);
  }
});

document.getElementById('gateInput').addEventListener('keydown', e => {
  if (e.key==='Enter') tryUnlock();
});

// ── Render ────────────────────────────────────────────────────────────────────
let orderedKeys = [];

function renderAll() {
  document.getElementById('schedTitle').value = state.title;
  document.title = state.title;
  document.getElementById('rangeStart').value = state.range.start;
  document.getElementById('rangeEnd').value   = state.range.end;
  renderSlotToggles();
  render();
}

function getDays() {
  const s=fromISO(state.range.start), e=fromISO(state.range.end);
  const days=[]; let c=new Date(s);
  while(c<=e){ days.push(new Date(c)); c=addDays(c,1); }
  return days;
}
function getActiveSlots() { return ALL_SLOTS.filter(s=>state.activeSlots.includes(s.id)); }

function render() {
  const days=getDays(), slots=getActiveSlots();
  const wrap=document.getElementById('tableWrap');

  if (!state.people||state.people.length===0) {
    wrap.innerHTML=`<div class="empty-state"><div class="big">👤</div><div>No people yet — click <strong>+ Person</strong> to add someone.</div></div>`;
    return;
  }
  if (!days.length||!slots.length) {
    wrap.innerHTML=`<div class="empty-state"><div class="big">📅</div><div>Set a valid date range and at least one time slot.</div></div>`;
    return;
  }

  orderedKeys=[];
  let html=`<table class="schedule-table"><thead>`;
  html+=`<tr class="row-days"><th class="th-name-head col-name">Name</th><th class="th-email-head col-email">Email</th>`;
  days.forEach(d=>{
    const cls=(isToday(d)?' today':'')+(isWeekend(d)?' weekend':'');
    html+=`<th class="th-day${cls}" colspan="${slots.length}">${DAY_SHORT[d.getDay()]} ${d.getDate()} ${MONTH_SHORT[d.getMonth()]}</th>`;
  });
  html+=`</tr><tr class="row-slots"><th class="th-slot-name-empty col-name"></th><th class="th-slot-email-empty col-email"></th>`;
  days.forEach(d=>slots.forEach((slot,si)=>{
    html+=`<th class="th-slot" style="${si===slots.length-1?'border-right:2px solid var(--border)':''}">${slot.label}</th>`;
  }));
  html+=`</tr></thead><tbody>`;

  (state.people||[]).forEach(person=>{
    html+=`<tr data-person="${person.id}">
      <td class="cell-name col-name">
        <span class="name-text" title="${esc(person.name)}">${esc(person.name)}</span>
        <div class="row-actions">
          <button class="row-act-btn" onclick="openEditPerson('${person.id}')">edit</button>
          <button class="row-act-btn del" onclick="deletePerson('${person.id}')">remove</button>
        </div>
      </td>
      <td class="cell-email col-email"><span class="email-text" title="${esc(person.email)}">${esc(person.email)||'—'}</span></td>`;

    days.forEach(d=>slots.forEach((slot,si)=>{
      const cell=getCell(person.id,d,slot.id);
      const key=cellKey(person.id,d,slot.id);
      orderedKeys.push(key);
      const last=si===slots.length-1;
      const selCls=selection.has(key)?' selected':'';
      const todCls=isToday(d)?' today-col':'';
      const icon=cell.state==='avail'?'✓':cell.state==='busy'?'✗':'';
      html+=`<td class="cell-slot state-${cell.state}${selCls}${todCls}${last?' last-in-day':''}"
        data-key="${key}" data-pid="${person.id}" data-date="${toISO(d)}" data-slot="${slot.id}"
        title="${esc(person.name)} · ${slot.full} · ${toISO(d)}">
        <div class="slot-inner">
          ${icon?`<span class="slot-icon">${icon}</span>`:''}
          ${cell.activity?`<span class="slot-label">${esc(cell.activity)}</span>`:''}
        </div>
      </td>`;
    }));
    html+=`</tr>`;
  });

  html+=`</tbody></table>`;
  wrap.innerHTML=html;
  attachCellEvents();
}

// ── Selection ─────────────────────────────────────────────────────────────────
let selection=new Set(), lastClickedKey=null, isDragging=false, dragStartKey=null, dragMode=null;

function selectionToggle(k) { selection.has(k)?selection.delete(k):selection.add(k); }
function clearSelection() { selection.clear(); lastClickedKey=null; updateSelectionUI(); }

function updateSelectionUI() {
  document.querySelectorAll('.cell-slot').forEach(el=>el.classList.toggle('selected',selection.has(el.dataset.key)));
  const n=selection.size;
  document.getElementById('bulkCount').textContent=`${n} cell${n!==1?'s':''} selected`;
  const bar=document.getElementById('bulkBar');
  if(n>0) bar.classList.add('show'); else { bar.classList.remove('show'); hideBulkLabel(); }
}

function keysBetween(a,b) {
  const ia=orderedKeys.indexOf(a), ib=orderedKeys.indexOf(b);
  if(ia<0||ib<0) return [b];
  return orderedKeys.slice(Math.min(ia,ib),Math.max(ia,ib)+1);
}

function attachCellEvents() {
  document.querySelectorAll('.cell-slot').forEach(el=>{
    el.addEventListener('mousedown',e=>{
      if(e.button!==0) return;
      e.preventDefault();
      const key=el.dataset.key;
      if(e.ctrlKey||e.metaKey) { selectionToggle(key); lastClickedKey=key; updateSelectionUI(); return; }
      if(e.shiftKey&&lastClickedKey) { keysBetween(lastClickedKey,key).forEach(k=>selection.add(k)); lastClickedKey=key; updateSelectionUI(); return; }
      isDragging=false; dragStartKey=key;
      dragMode=selection.has(key)?'remove':'add';
      if(!e.ctrlKey&&!e.metaKey&&!e.shiftKey) selection.clear();
    });
    el.addEventListener('mouseenter',e=>{
      if(!dragStartKey) return;
      isDragging=true;
      const key=el.dataset.key;
      dragMode==='add'?selection.add(key):selection.delete(key);
      updateSelectionUI();
    });
  });

  document.addEventListener('mouseup',e=>{
    if(!dragStartKey) return;
    const key=dragStartKey; dragStartKey=null;
    if(!isDragging) {
      if(!e.ctrlKey&&!e.metaKey&&!e.shiftKey&&selection.size<=1) {
        selection.clear(); updateSelectionUI();
        const el=document.querySelector(`[data-key="${key}"]`);
        if(el) openCellEdit(el.dataset.pid,el.dataset.date,el.dataset.slot);
        return;
      }
      selection.add(key); lastClickedKey=key; updateSelectionUI();
    } else {
      selection.add(key); lastClickedKey=key; isDragging=false; updateSelectionUI();
    }
  });

  document.getElementById('tableWrap').addEventListener('selectstart',e=>{ if(dragStartKey) e.preventDefault(); });
}

// ── Bulk ops ──────────────────────────────────────────────────────────────────
function bulkSetState(newState) {
  if(!state.cells) state.cells={};
  selection.forEach(key=>{
    const ex=state.cells[key]||{state:'empty',activity:''};
    if(newState==='empty'&&!ex.activity) delete state.cells[key];
    else state.cells[key]={state:newState,activity:ex.activity||''};
  });
  save(); render(); updateSelectionUI();
}
function toggleBulkLabel() {
  const row=document.getElementById('bulkLabelRow');
  row.classList.toggle('show',!row.classList.contains('show'));
  if(row.classList.contains('show')) setTimeout(()=>document.getElementById('bulkLabelInput').focus(),50);
}
function hideBulkLabel() { document.getElementById('bulkLabelRow').classList.remove('show'); document.getElementById('bulkLabelInput').value=''; }
function bulkApplyLabel() {
  const label=document.getElementById('bulkLabelInput').value.trim();
  if(!state.cells) state.cells={};
  selection.forEach(key=>{
    const ex=state.cells[key]||{state:'empty',activity:''};
    state.cells[key]={state:ex.state==='empty'?'avail':ex.state,activity:label};
  });
  hideBulkLabel(); save(); render(); updateSelectionUI();
}

// ── Single cell modal ─────────────────────────────────────────────────────────
let editingCell=null, pendingState='empty';

function openCellEdit(pid,dateStr,slotId) {
  editingCell={pid,dateStr,slotId};
  const person=(state.people||[]).find(p=>p.id===pid);
  const slot=ALL_SLOTS.find(s=>s.id===slotId);
  const cell=getCell(pid,fromISO(dateStr),slotId);
  pendingState=cell.state;
  const d=fromISO(dateStr);
  document.getElementById('cellModalTitle').textContent=person.name;
  document.getElementById('cellModalSub').textContent=`${DAY_SHORT[d.getDay()]} ${d.getDate()} ${MONTH_SHORT[d.getMonth()]} · ${slot.full}`;
  document.getElementById('cellActivity').value=cell.activity||'';
  updateStatePicker(pendingState);
  openModal('cellModal');
  setTimeout(()=>document.getElementById('cellActivity').focus(),100);
}
function selectState(s) { pendingState=s; updateStatePicker(s); }
function updateStatePicker(s) { document.querySelectorAll('.state-option').forEach(el=>el.classList.toggle('selected',el.classList.contains(s))); }
function saveCellEdit() {
  if(!editingCell) return;
  const {pid,dateStr,slotId}=editingCell;
  const key=`${pid}|${dateStr}|${slotId}`;
  const activity=document.getElementById('cellActivity').value.trim();
  if(!state.cells) state.cells={};
  if(pendingState==='empty'&&!activity) delete state.cells[key];
  else state.cells[key]={state:pendingState,activity};
  closeModal('cellModal'); save(); render();
}

// ── People ────────────────────────────────────────────────────────────────────
function openAddPerson() { document.getElementById('newName').value=''; document.getElementById('newEmail').value=''; openModal('addPersonModal'); setTimeout(()=>document.getElementById('newName').focus(),100); }
function confirmAddPerson() {
  const name=document.getElementById('newName').value.trim();
  const email=document.getElementById('newEmail').value.trim();
  if(!name) return;
  if(!state.people) state.people=[];
  state.people.push({id:uid(),name,email});
  closeModal('addPersonModal'); save(); render();
}
let editingPersonId=null;
function openEditPerson(id) {
  editingPersonId=id;
  const p=(state.people||[]).find(p=>p.id===id);
  document.getElementById('editName').value=p.name;
  document.getElementById('editEmail').value=p.email||'';
  openModal('editPersonModal');
  setTimeout(()=>document.getElementById('editName').focus(),100);
}
function confirmEditPerson() {
  const p=(state.people||[]).find(p=>p.id===editingPersonId);
  if(!p) return;
  p.name=document.getElementById('editName').value.trim()||p.name;
  p.email=document.getElementById('editEmail').value.trim();
  closeModal('editPersonModal'); save(); render();
}
function deletePerson(id) {
  if(!confirm('Remove this person and all their data?')) return;
  state.people=(state.people||[]).filter(p=>p.id!==id);
  Object.keys(state.cells||{}).forEach(k=>{ if(k.startsWith(id+'|')) delete state.cells[k]; });
  save(); render();
}

// ── Slot toggles ──────────────────────────────────────────────────────────────
function renderSlotToggles() {
  const wrap=document.getElementById('slotToggles'); wrap.innerHTML='';
  ALL_SLOTS.forEach(slot=>{
    const active=(state.activeSlots||[]).includes(slot.id);
    const el=document.createElement('label');
    el.className='slot-check'+(active?' active':'');
    el.title=slot.full;
    el.innerHTML=`<input type="checkbox" ${active?'checked':''}>${slot.label}`;
    el.addEventListener('click',e=>{ e.preventDefault(); toggleSlot(slot.id); });
    wrap.appendChild(el);
  });
}
function toggleSlot(id) {
  if(!state.activeSlots) state.activeSlots=['s1','s2','s3','s4','s5'];
  if(state.activeSlots.includes(id)) {
    if(state.activeSlots.length===1) return;
    state.activeSlots=state.activeSlots.filter(s=>s!==id);
  } else {
    state.activeSlots.push(id);
    state.activeSlots.sort((a,b)=>ALL_SLOTS.findIndex(s=>s.id===a)-ALL_SLOTS.findIndex(s=>s.id===b));
  }
  save(); renderSlotToggles(); render();
}

// ── Range ─────────────────────────────────────────────────────────────────────
function applyRange() {
  const s=document.getElementById('rangeStart').value;
  const e=document.getElementById('rangeEnd').value;
  if(!s||!e||fromISO(s)>fromISO(e)) return;
  state.range={start:s,end:e};
  save(); render();
}

// ── Modals ────────────────────────────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function maybeClose(e,id) { if(e.target===document.getElementById(id)) closeModal(id); }

// ── Export ────────────────────────────────────────────────────────────────────
function exportJSON() {
  const a=document.createElement('a');
  a.download=(state.title||'schedule')+'.json';
  a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));
  a.click();
}
function exportCSV() {
  const days=getDays(), slots=getActiveSlots(), lines=[];
  const header=['Name','Email'];
  days.forEach(d=>slots.forEach(slot=>header.push(`${DAY_SHORT[d.getDay()]} ${d.getDate()} ${MONTH_SHORT[d.getMonth()]} ${slot.label}`)));
  lines.push(header.map(h=>`"${h}"`).join(','));
  (state.people||[]).forEach(person=>{
    const row=[person.name,person.email||''];
    days.forEach(d=>slots.forEach(slot=>{
      const cell=getCell(person.id,d,slot.id);
      row.push(cell.state==='empty'?'':(cell.state+(cell.activity?': '+cell.activity:'')));
    }));
    lines.push(row.map(v=>`"${v}"`).join(','));
  });
  const a=document.createElement('a');
  a.download=(state.title||'schedule')+'.csv';
  a.href=URL.createObjectURL(new Blob([lines.join('\n')],{type:'text/csv'}));
  a.click();
}

// ── Title ─────────────────────────────────────────────────────────────────────
document.getElementById('schedTitle').addEventListener('input',e=>{
  state.title=e.target.value; document.title=state.title; save();
});

// ── Keyboard ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') { ['cellModal','addPersonModal','editPersonModal'].forEach(closeModal); clearSelection(); }
  if(e.key==='Enter'&&document.getElementById('addPersonModal').classList.contains('open')) confirmAddPerson();
  if(e.key==='Enter'&&document.getElementById('cellModal').classList.contains('open')) saveCellEdit();
  if(e.key==='Enter'&&document.getElementById('editPersonModal').classList.contains('open')) confirmEditPerson();
  if(e.key==='Enter'&&document.getElementById('bulkLabelRow').classList.contains('show')) bulkApplyLabel();
  if((e.ctrlKey||e.metaKey)&&e.key==='a') { e.preventDefault(); orderedKeys.forEach(k=>selection.add(k)); updateSelectionUI(); }
});
</script>
</body>
</html>
